<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestão de Projetos</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container-fluid">

        <!-- Linha geral -->
        <div class="row">
            <!-- INICIO DA ESTRUTURA BASE -->
            <!-- Barra lateral -->
            <div class="barraLateral col-4 col-md-4 col-lg-2">
                <div class="row">
                    <div class="col-12">
                        <div class="logo">
                            <img src="img/logo.png" alt="">
                        </div>
                    </div>
                </div>
                <hr style="background-color: white; border: none;height: 2px;">

                <!-- Menu -->
                <div class="row">
                    <div class="col-12">
                        <div class="menu">
                            <ul>
                                <li><a class="menuItem" href="index.html">
                                        <span class="material-icons">dashboard</span>
                                        Dashboard
                                    </a>

                                </li>
                                <li><a class=" menuItem active" href="projetos.html">
                                        <span class="material-icons">folder</span>
                                        Projetos
                                    </a>
                                </li>
                                <li><a class="menuItem" href="tarefas.html">
                                        <span class="material-icons">task</span>
                                        Tarefas
                                    </a></li>

                                <li><a class="menuItem" href="usuarios.html">
                                        <span class="material-icons">person</span>
                                        Usuarios
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="row mt-auto">
                    <div class="col-12">
                        <hr class="mb-1" style="background-color: white; border: none;height: 2px;">

                        <button class="menuItem m-0" style="border: none; height:40px;" onclick="logout()">
                            <span class="material-icons text-white">logout</span>
                            Sair
                        </button>
                        <hr class="mt-1" style="background-color: white; border: none;height: 2px;">
                    </div>
                </div>
            </div>
            <!-- Fim da barra lateral -->
            <!-- Segunda coluna -->
            <div class="geral col-8 col-md-8 col-lg-10">

                <!-- Barra superior -->
                <div class="row barraSuperior">
                    <div class="col-12 px-0">
                        <div class="row barraPerfil mx-0">
                            <div class="col-5 col-s col-md-8 col-lg-10">
                            </div>
                            <div class="col-7 col-sm-6 col-md-4 col-lg-2 d-flex">
                                <div class="userPerfil card shadow">
                                    <button class="btn">
                                        <span class="material-icons" style="font-size: 24px;margin-top: 3px; ">
                                            notifications_none
                                        </span>
                                    </button>
                                    <!-- <img src="img/avatar.jpg" alt="" class="rounded-circle" width="40" height="40"> -->
                                    <b class="rounded-circle align-middle d-inline-flex justify-content-center align-items-center text-white"
                                        style="width: 40px; height: 40px; min-width: 40px; background-color:var(--cor-siglasBG); padding: 4px; font-size: 20px;"
                                        id="siglaNome"></b>
                                    <b id="nomeUsuario">Username</b>
                                </div>
                            </div>
                        </div>


                        <!-- título da página -->
                        <div class="row mx-0">
                            <div class="barraTitulo col-md-12">
                                <span class="material-icons">folder</span>
                                Projetos
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FIM DA ESTRUTURA BASE -->

                <!-- Barra de ações -->
                <div class="barraAcoes">
                    <div class="row mx-0 flex-row">
                        <div class="col-7 col-md-8 col-lg-5">
                            <div class="input-group flex-nowrap">
                                <span class="input-group-text mx">
                                    <span class="material-icons">search</span>
                                </span>
                                <input type="text" class="form-control" placeholder="Search..." aria-label="Username"
                                    aria-describedby="addon-wrapping">
                            </div>
                        </div>
                        <div class="col-5 col-md-4 col-lg-7 d-flex justify-content-end" style="white-space: nowrap;">
                            <!-- Botão Novo projeto -->
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProjeto">
                                <b>+ Novo Projeto</b>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Conteúdo principal -->
                <div class="row mx-0 px-0">
                    <div class="conteudo col-md-12">
                        <!-- Tabela Projetos -->
                        <div class="row mx-0 mt-4" style="height: 800px;">
                            <div class="graficoTarefas col-12 h-100">
                                <h4><b>TABELA</b></h4>
                            </div>
                        </div>
                        <!-- Fim tabela projetos -->
                    </div>
                </div>
                <!-- Fim conteúdo principal -->
            </div>
            <!-- Fim segunda coluna -->
        </div>
        <!-- Fim linha geral -->
    </div>
    <!-- Modal com form-->
    <div class="modal fade" id="modalProjeto" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered modal-lg">

            <div class="modal-content">

                <!-- Cabeçalho -->
                <div class="modal-header">

                    <h5 class="modal-title">
                        Novo Projeto
                    </h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

                </div>

                <!-- Corpo -->
                <div class="modal-body">
                    <form id="formProjeto">

                        <!-- Nome do projeto -->
                        <div class="mb-3">
                            <label for="tituloProjeto" class="form-label fw-semibold">Nome do
                                projeto : <span class="text-danger">*</span></label>
                            <input type="text" id="tituloProjeto" name="tituloProjeto" class="form-control"
                                placeholder="Digite o nome do projeto" autocomplete="off" required>
                            <div class="invalid-feedback">Informe o título do projeto.</div>

                        </div>

                        <!-- Descrição -->
                        <div class="mb-3">
                            <label for="descricaoProjeto" class="form-label fw-semibold">Descrição:</label>
                            <textarea id="descricaoProjeto" name="descricaoProjeto" class="form-control"
                                placeholder="Descreva o projeto" rows="4"></textarea>
                        </div>

                        <!-- Data de criação + Data de conclusão -->
                        <div class="row mb-3">
                            <div class="col-6">
                                <label for="dataCriacaoProjeto" class="form-label fw-semibold">Data
                                    de criação: <span class="text-danger">*</span></label>
                                <input type="date" id="dataCriacaoProjeto" name="dataCriacaoProjeto"
                                    class="form-control" required>
                                <div class="invalid-feedback">Informe a data de criação.</div>

                            </div>
                            <div class="col-6">
                                <label for="dataConclusaoProjeto" class="form-label fw-semibold">Data de
                                    conclusão</label>
                                <input type="date" id="dataConclusaoProjeto" name="dataConclusaoProjeto"
                                    class="form-control">
                            </div>
                        </div>

                        <!-- statusProjeto + Responsável -->
                        <div class="row mb-4">
                            <div class="col-6">
                                <label for="statusProjeto" class="form-label fw-semibold">status: <span
                                        class="text-danger">*</span></label>
                                <select id="statusProjeto" name="statusProjeto" class="form-select" required>
                                    <option value="" disabled>Selecione</option>
                                    <option value="ATIVO" selected>Ativo</option>
                                    <option value="CONCLUIDO">Concluido</option>
                                    <option value="CANCELADO">Cancelado</option>
                                </select>
                                <div class="invalid-feedback">Selecione o status.</div>

                            </div>
                            <div class="col-6">

                                <label for="responsavelProjeto" class="form-label fw-semibold">Responsável: <span
                                        class="text-danger">*</span></label>
                                <input type="text" id="responsavelProjeto" name="responsavelProjeto"
                                    class="form-control" list="listaUsuarios" placeholder="Digite o responsável"
                                    autocomplete="off" required>
                                <datalist id="listaUsuarios"></datalist>

                                <div class="invalid-feedback">Informe um responsável.</div>

                            </div>
                        </div>

                        <!-- Botões -->
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-success btn-lg"
                                onclick="validarFormProjeto()">Salvar</button>
                            <button type="button" class="btn btn-outline-danger btn-lg" data-bs-dismiss="modal"
                                onclick="cancelarFormulario('formProjeto');setarData('dataCriacaoProjeto',hoje)">Cancelar</button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
    <!-- Fim do modal -->
    <script src="js/bootstrap.js">
    </script>
    <script src="js/main.js">
    </script>
    <script src="js/projetos.js"></script>

</body>

</html>
