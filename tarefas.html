<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestão de Projetos</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container-fluid">

        <!-- Linha geral -->
        <div class="row">
            <!-- INICIO DA ESTRUTURA BASE -->
            <!-- Barra lateral -->
            <div class="barraLateral col-4 col-md-4 col-lg-2">
                <div class="row">
                    <div class="col-12">
                        <div class="logo">
                            <img src="img/logo.png" alt="">
                        </div>
                    </div>
                </div>
                <hr style="background-color: white; border: none;height: 2px;">

                <!-- Menu -->
                <div class="row">
                    <div class="col-12">
                        <div class="menu">
                            <ul>
                                <li><a class="menuItem" href="index.html">
                                        <span class="material-icons">dashboard</span>
                                        Dashboard
                                    </a>

                                </li>
                                <li><a class=" menuItem" href="projetos.html">
                                        <span class="material-icons">folder</span>
                                        Projetos
                                    </a>
                                </li>
                                <li><a class="menuItem active" href="tarefas.html">
                                        <span class="material-icons">task</span>
                                        Tarefas
                                    </a></li>

                                <li><a class="menuItem" href="usuarios.html">
                                        <span class="material-icons">person</span>
                                        Usuarios
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="row mt-auto">
                    <div class="col-12">
                        <hr class="mb-1" style="background-color: white; border: none;height: 2px;">

                        <button class="menuItem m-0" style="border: none; height:40px;" onclick="logout()">
                            <span class="material-icons text-white">logout</span>
                            Sair
                        </button>
                        <hr class="mt-1" style="background-color: white; border: none;height: 2px;">
                    </div>
                </div>
            </div>
            <!-- Fim da barra lateral -->

            <!-- Segunda coluna -->
            <div class="geral col-8 col-md-8 col-lg-10">

                <!-- Barra superior -->
                <div class="row barraSuperior">
                    <div class="col-12 px-0">
                        <div class="row barraPerfil mx-0">
                            <div class="col-5 col-sm-6 col-md-8 col-lg-10">
                            </div>
                            <div class="col-7 col-sm-6 col-md-4 col-lg-2 d-flex">
                                <div class="userPerfil card shadow">
                                    <button class="btn">
                                        <span class="material-icons" style="font-size: 24px;margin-top: 3px; ">
                                            notifications_none
                                        </span>
                                    </button>
                                    <!-- <img src="img/avatar.jpg" alt="" class="rounded-circle" width="40" height="40"> -->
                                    <b class="rounded-circle align-middle d-inline-flex justify-content-center align-items-center"
                                        style="width: 40px; height: 40px;min-width: 40px; background-color:var(--cor-siglasBG); color: white; padding: 4px; font-size: 20px;"
                                        id="siglaNome"></b>
                                    <b id="nomeUsuario">Username</b>
                                </div>
                            </div>
                        </div>

                        <!-- título da página -->
                        <div class="row mx-0">
                            <div class="barraTitulo col-md-12">
                                <span class="material-icons">task</span>
                                Tarefas
                            </div>
                        </div>
                    </div>
                </div>
                <!-- FIM DA ESTRUTURA BASE -->
                <div class="barraAcoes">
                    <div class="row mx-0 flex-row">
                        <div class="col-7 col-md-8 col-lg-5">
                            <div class="input-group flex-nowrap">
                                <span class="input-group-text mx">
                                    <span class="material-icons">search</span>
                                </span>
                                <input type="text" class="form-control" placeholder="Search..." aria-label="Username"
                                    aria-describedby="addon-wrapping">
                            </div>
                        </div>
                        <div class="col-5 col-md-4 col-lg-7 d-flex justify-content-end" style="white-space: nowrap;">
                            <!-- Botão Nova tarefa-->
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTarefa">
                                <b>+ Nova Tarefa</b>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Conteúdo principal -->
                <div class="row">
                    <div class="conteudo col-md-12">
                        <!-- Tabela Tarefas -->
                        <div class="row mx-0 mt-4" style="height: 800px;">
                            <div class="graficoTarefas col-12 h-100">
                                <h4><b>TABELA</b></h4>
                            </div>
                        </div>
                        <!-- Fim tabela Tarefas -->

                    </div>
                    <!-- Fim conteúdo principal -->
                </div>
                <!-- Fim segunda coluna -->
            </div>
            <!-- Fim linha geral -->
        </div>
        <!--  Inicio Modal -->
        <div class="modal fade" id="modalTarefa" tabindex="-1">

            <div class="modal-dialog modal-dialog-centered modal-lg">

                <div class="modal-content">

                    <!-- Cabeçalho -->
                    <div class="modal-header">

                        <h5 class="modal-title">
                            Nova Tarefa
                        </h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

                    </div>

                    <!-- Corpo -->
                    <div class="modal-body" id="modalTarefa">

                        <form id="formTarefa">
                            <!-- Título -->
                            <div class="mb-3">
                                <label for="tituloTarefa" class="form-label fw-semibold">Título: <span
                                        class="text-danger">*</span></label>
                                <input type="text" id="tituloTarefa" name="tituloTarefa" class="form-control"
                                    placeholder="Digite o título da tarefa" autocomplete="off" required>
                                <div class="invalid-feedback">Informe o título da tarefa.</div>

                            </div>

                            <!-- prioridadeTarefa -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="prioridadeTarefa" class="form-label fw-semibold">prioridade: <span
                                            class="text-danger">*</span></label>
                                    <select id="prioridadeTarefa" name="prioridadeTarefa" class="form-select" required>
                                        <option value="" disabled selected>Selecione</option>
                                        <option value="BAIXA">Baixa</option>
                                        <option value="MEDIA">Média</option>
                                        <option value="ALTA">Alta</option>
                                    </select>
                                    <div class="invalid-feedback">Selecione a prioridade.</div>

                                </div>
                                <!-- Responsável -->
                                <div class="col-md-6 mb-3">

                                    <label for="responsavelTarefa" class="form-label fw-semibold">
                                        Responsável:
                                        <span class="text-danger">*</span>
                                    </label>

                                    <input type="text" id="responsavelTarefa" name="responsavelTarefa"
                                        class="form-control" list="listaUsuarios" placeholder="Digite o responsável"
                                        autocomplete="off" required>

                                    <datalist id="listaUsuarios"></datalist>

                                    <div class="invalid-feedback">
                                        Informe o responsável.
                                    </div>

                                </div>
                            </div>

                            <!-- Descrição -->
                            <div class="mb-3">
                                <label for="descricaoTarefa" class="form-label fw-semibold">Descrição:</label>
                                <textarea id="descricaoTarefa" name="descricaoTarefa" class="form-control"
                                    placeholder="Descreva a tarefa" rows="4"></textarea>
                            </div>

                            <!-- Data de criação + Data de conclusão -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="dataCriacaoTarefa" class="form-label fw-semibold">Data
                                        de criação:
                                        <span class="text-danger">*</span></label>
                                    <input type="date" id="dataCriacaoTarefa" name="dataCriacaoTarefa"
                                        class="form-control" required>
                                    <div class="invalid-feedback">Informe uma data válida.</div>

                                </div>

                                <!-- Data de conclusão -->
                                <div class="col-md-6 mb-3">
                                    <label for="dataConclusaoTarefa" class="form-label fw-semibold">Data de
                                        conclusão:
                                        <span class="text-danger">*</span></label>
                                    <input type="date" id="dataConclusaoTarefa" name="dataConclusaoTarefa"
                                        class="form-control" />
                                </div>
                            </div>

                            <!-- Status + Projeto -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="statusTarefa" class="form-label fw-semibold">Status:
                                        <span class="text-danger">*</span></label>
                                    <select id="statusTarefa" name="statusTarefa" class="form-select" required>
                                        <option value="" disabled selected>Selecione</option>
                                        <option value="PENDENTE">Pendente</option>
                                        <option value="EM_ANDAMENTO">Em andamento</option>
                                        <option value="CONCLUIDA">Concluído</option>
                                    </select>
                                    <div class="invalid-feedback">Selecione o status.</div>

                                </div>

                                <!-- Projeto -->
                                <div class="col-md-6 mb-3">
                                    <label for="projetoTarefa" class="form-label fw-semibold">Projeto:
                                        <span class="text-danger">*</span></label>
                                    <select id="projetoTarefa" name="projetoTarefa" class="form-select" required>
                                        <option value="" disabled selected>Selecione</option>
                                        <option value="projeto1">Projeto 1</option>
                                        <option value="projeto2">Projeto 2</option>
                                        <option value="projeto3">Projeto 3</option>
                                    </select>
                                    <div class="invalid-feedback">Selecione o projeto.</div>
                                </div>
                            </div>

                            <!-- Definir Lembrete -->
                            <!-- <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="lembrete" name="lembrete" />
                                    <label class="form-check-label fw-semibold" for="lembrete">Definir
                                        Lembrete</label>
                                </div>
                            </div> -->

                            <!-- Botões -->
                            <div class="d-grid gap-2">
                                <button type="button" class="btn btn-success btn-lg"
                                    onclick="validarFormTarefa()">Salvar</button>
                                <button type="button" class="btn btn-outline-danger btn-lg" data-bs-dismiss="modal"
                                    onclick="cancelarFormulario('formTarefa');setarData('dataCriacaoTarefa',hoje)">Cancelar</button>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>
        <!-- Fim do modal -->
        <script src=" js/bootstrap.js">
        </script>
        <script src="js/main.js">
        </script>
        <script src="js/tarefas.js"></script>
</body>

</html>
